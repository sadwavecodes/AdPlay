<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#030712;stop-opacity:1" />
    </linearGradient>
    
    <filter id="neon" x="-10%" y="-10%" width="120%" height="120%">
      <feFlood flood-color="#22c55e" flood-opacity="0.3" result="greenFlood"/>
      <feComposite in="greenFlood" in2="SourceAlpha" operator="in" result="greenAlpha"/>
      <feGaussianBlur in="greenAlpha" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="64" cy="64" r="62" fill="url(#bg)" stroke="#1e293b" stroke-width="4"/>
  
  <circle cx="64" cy="64" r="56" fill="none" stroke="#22c55e" stroke-width="3" filter="url(#neon)"/>
  
  <text x="51%" y="54%" dominant-baseline="central" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="900" font-size="75" fill="white">A</text>
  
  <circle cx="95" cy="33" r="6" fill="#22c55e" filter="url(#neon)"/>
</svg>
