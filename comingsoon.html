<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name='admaven-placement' content='Bqjs8rjg6'>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>AdPlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030712;
            --card-bg: rgba(17, 24, 39, 0.85);
            --accent: #22c55e;
            --accent-glow: rgba(34, 197, 94, 0.2);
            --text-dim: #94a3b8;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100svh;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: white;
        }

        .background {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: 
                radial-gradient(circle at 15% 15%, rgba(34, 197, 94, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 85% 85%, rgba(34, 197, 94, 0.1) 0%, transparent 40%);
        }

        .background::before {
            content: "";
            position: absolute;
            inset: 0;
            opacity: 0.025;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 50px 30px;
            border-radius: 32px;
            text-align: center;
            width: 90%;
            max-width: 340px;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.7);
        }

        .logo {
            font-weight: 900;
            font-size: 32px;
            letter-spacing: -1.5px;
            margin-bottom: 6px;
        }

        .logo span { color: var(--accent); }

        .sub {
            color: var(--accent);
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 45px;
            opacity: 0.8;
        }

        .coin-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 45px;
            perspective: 1200px;
        }

        #coin {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 2s cubic-bezier(0.15, 0, 0.05, 1);
        }

        .side {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 28px;
            border: 5px solid #fbbf24;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .heads { 
            background: linear-gradient(135deg, #fef08a, #d97706); 
            color: #451a03; 
        }
        
        .tails { 
            background: linear-gradient(135deg, #fbbf24, #92400e); 
            color: #451a03; 
            transform: rotateY(180deg); 
        }

        button {
            background: var(--accent);
            color: #052e16;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 25px -5px var(--accent-glow);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
        }

        button:active { 
            transform: scale(0.96) translateY(0); 
        }

        button:disabled { 
            opacity: 0.3; 
            filter: grayscale(1); 
            cursor: not-allowed;
            transform: scale(1);
        }

        .score-box {
            margin-top: 35px;
            font-size: 13px;
            color: var(--text-dim);
            font-weight: 600;
            letter-spacing: 1px;
        }

        #wins { 
            color: white; 
            font-size: 16px; 
            margin-left: 6px; 
            transition: color 0.3s ease;
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="card">
        <div class="logo">AdPlay<span>.fun</span></div>
        <div class="sub">Coming Soon</div>

        <div class="coin-container">
            <div id="coin">
                <div class="side heads">H</div>
                <div class="side tails">T</div>
            </div>
        </div>

        <button id="flipBtn">Flip Coin</button>

        <div class="score-box">
            TOTAL WINS: <b id="wins">0</b>
        </div>
    </div>

    <script>
        const coin = document.getElementById('coin');
        const btn = document.getElementById('flipBtn');
        const winDisplay = document.getElementById('wins');
        
        let wins = parseInt(localStorage.getItem('adplay_wins_only')) || 0;
        let currentRotation = 0;

        winDisplay.innerText = wins;

        btn.addEventListener('click', () => {
            if (btn.disabled) return;
            btn.disabled = true;
            
            const isHeads = Math.random() < 0.5;
            
            // Logic Fix:
            // 1. Calculate how many full 360-degree spins to add (the "blur" effect)
            const extraSpins = (Math.floor(Math.random() * 5) + 6) * 360; 
            
            // 2. Determine the target state based on current rotation
            // We check if the coin is currently on Tails (odd multiple of 180) 
            // and adjust so the NEXT rotation lands exactly on the intended face.
            const currentFacingHeads = (currentRotation / 180) % 2 === 0;
            
            if (isHeads) {
                // If we want Heads and we are on Tails, add 180. If on Heads, add 0.
                currentRotation += extraSpins + (currentFacingHeads ? 0 : 180);
            } else {
                // If we want Tails and we are on Heads, add 180. If on Tails, add 0.
                currentRotation += extraSpins + (currentFacingHeads ? 180 : 0);
            }

            coin.style.transform = `rotateY(${currentRotation}deg)`;

            if (window.navigator.vibrate) {
                window.navigator.vibrate([30, 30, 30]);
            }

            setTimeout(() => {
                if (isHeads) {
                    wins++;
                    localStorage.setItem('adplay_wins_only', wins);
                    winDisplay.innerText = wins;
                    winDisplay.style.color = "#22c55e";
                    setTimeout(() => winDisplay.style.color = "white", 600);
                }
                btn.disabled = false;
            }, 2000);
        });
    </script>
</body>
</html>
