<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name='admaven-placement' content='Bqjs8rjg6'>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>AdPlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030712;
            --card-bg: rgba(17, 24, 39, 0.8);
            --accent: #22c55e;
            --accent-glow: rgba(34, 197, 94, 0.2);
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100svh;
            font-family: 'Inter', sans-serif; background-color: var(--bg-color);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; color: white;
        }

        .background { position: fixed; inset: 0; z-index: -1; }
        .background::before {
            content: ""; position: absolute; inset: 0; opacity: 0.02; pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        .card {
            background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05); padding: 50px 30px;
            border-radius: 32px; text-align: center; width: 90%; max-width: 340px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo { font-weight: 900; font-size: 32px; letter-spacing: -1.5px; margin-bottom: 8px; }
        .logo span { color: var(--accent); }
        .sub { color: var(--accent); font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 40px; opacity: 0.8; }

        .coin-container { width: 120px; height: 120px; margin: 0 auto 45px; perspective: 1000px; }
        #coin { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 2s cubic-bezier(0.15, 0, 0.05, 1); }

        .side {
            position: absolute; inset: 0; border-radius: 50%; backface-visibility: hidden;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 28px; border: 5px solid #fbbf24;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .heads { background: linear-gradient(135deg, #fef08a, #d97706); color: #451a03; }
        .tails { background: linear-gradient(135deg, #fbbf24, #92400e); color: #451a03; transform: rotateY(180deg); }

        button {
            background: var(--accent); color: #052e16; border: none; width: 100%;
            padding: 18px; border-radius: 20px; font-weight: 800; font-size: 15px;
            cursor: pointer; transition: all 0.2s ease;
            box-shadow: 0 10px 25px -5px var(--accent-glow);
            text-transform: uppercase; letter-spacing: 1px;
        }

        button:active { transform: scale(0.95); }
        button:disabled { opacity: 0.3; filter: grayscale(1); }

        .score-box { margin-top: 30px; font-size: 13px; color: var(--text-dim); font-weight: 600; }
        #wins { color: white; font-size: 16px; margin-left: 5px; }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="card">
        <div class="logo">AdPlay<span>.fun</span></div>
        <div class="sub">Coming Soon</div>
        <div class="coin-container">
            <div id="coin">
                <div class="side heads">H</div>
                <div class="side tails">T</div>
            </div>
        </div>
        <button id="flipBtn">Flip Coin</button>
        <div class="score-box">TOTAL WINS: <b id="wins">0</b></div>
    </div>

    <script>
        const coin = document.getElementById('coin');
        const btn = document.getElementById('flipBtn');
        const winDisplay = document.getElementById('wins');
        
        let wins = parseInt(localStorage.getItem('ap_wins')) || 0;
        let currentRotation = 0;
        winDisplay.innerText = wins;

        btn.addEventListener('click', () => {
            btn.disabled = true;
            const isHeads = Math.random() < 0.5;
            const extraSpins = (Math.floor(Math.random() * 5) + 6) * 360; 
            currentRotation += extraSpins + (isHeads ? 0 : 180);
            coin.style.transform = `rotateY(${currentRotation}deg)`;

            setTimeout(() => {
                if (isHeads) {
                    wins++;
                    localStorage.setItem('ap_wins', wins);
                    winDisplay.innerText = wins;
                }
                btn.disabled = false;
            }, 2000);
        });
    </script>
</body>
</html>
